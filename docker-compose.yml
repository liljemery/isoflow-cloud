services:
  isoflow:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: isoflow
      POSTGRES_PASSWORD: isoflow
      POSTGRES_DB: isoflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isoflow -d isoflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      ["sh", "-c", "cd /repo/apps/api && npx prisma migrate deploy && exec node dist/index.js"]
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://isoflow:isoflow@postgres:5432/isoflow
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
